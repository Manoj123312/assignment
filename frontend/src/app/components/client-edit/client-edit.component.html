<h2>Edit Client</h2>
<hr/>
<div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
<form (ngSubmit)="onSubmit()" #editForm="ngForm" class="form">
  <div class="form-group">
    <label>Name</label>
    <input name="name" type="text" [(ngModel)]="client.name" required class="form-control"/>
  </div>
  <div class="form-group">
    <label>Email</label>
    <input name="email" type="email" [(ngModel)]="client.email" required class="form-control"/>
  </div>
  <div class="form-group">
    <label>Address</label>
    <input name="address" type="text" [(ngModel)]="client.address" required class="form-control"/>
  </div>
  <div class="form-group">
    <label>New Password <small>(leave blank to keep unchanged)</small></label>
    <input name="password" type="password" [(ngModel)]="client.password" class="form-control"/>
  </div>
  <hr/>
  <button type="submit" class="btn btn-primary" [disabled]="!editForm.valid">Update</button>
  <a routerLink="/clients" class="btn btn-secondary">Cancel</a>
</form>
