<div class="form-container">
  <h2>Login</h2>
  <p class="subtitle">Please enter your credentials to continue.</p>
  <hr />

  <div *ngIf="error" class="alert alert-error">{{ error }}</div>

  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" [(ngModel)]="formData.email" name="email"
             placeholder="Enter Email" required />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" [(ngModel)]="formData.password" name="password"
             placeholder="Enter Password" required />
    </div>

    <hr />
    <button type="submit" class="btn btn-primary" [disabled]="loading">
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>
  </form>

  <p class="link-text">Don't have an account? <a routerLink="/register">Register here</a></p>
</div>
