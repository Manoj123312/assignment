<div class="form-container">
  <h1>Login</h1>
  <p>Please login to access the client management system.</p>
  <hr />

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="Enter Email" />
      <div class="error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        A valid email is required.
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" placeholder="Enter Password" />
      <div class="error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        Password is required (min 6 characters).
      </div>
    </div>

    <div class="message" [ngClass]="{ 'error': isError, 'success': !isError }" *ngIf="message">
      {{ message }}
    </div>

    <button type="submit" [disabled]="loginForm.invalid || isLoading">
      {{ isLoading ? 'Logging in...' : 'Login' }}
    </button>

    <p class="register-link">Don't have an account? <a routerLink="/register">Register</a></p>
  </form>
</div>
