<h2>Create a Meeting Schedule</h2>
<hr/>
<div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

<form (ngSubmit)="onSubmit()" #meetingForm="ngForm" class="form">
  <div class="form-group">
    <label for="topic">Meeting Topic</label>
    <input id="topic" name="topic" type="text" placeholder="Enter Meeting Topic"
           [(ngModel)]="meeting.topic" required class="form-control"/>
  </div>

  <div class="form-group">
    <label for="people">Number of People</label>
    <input id="people" name="number_of_people" type="number" min="1"
           placeholder="Enter number of people"
           [(ngModel)]="meeting.number_of_people" required class="form-control"/>
  </div>

  <div class="form-group">
    <label for="start_time">Start Time</label>
    <input id="start_time" name="start_time" type="datetime-local"
           [(ngModel)]="meeting.start_time" required class="form-control"/>
  </div>

  <div class="form-group">
    <label for="client_id">Client</label>
    <select id="client_id" name="client_id" [(ngModel)]="meeting.client_id" required class="form-control">
      <option [ngValue]="0" disabled>-- Select Client --</option>
      <option *ngFor="let c of clients" [ngValue]="c.id">{{ c.name }}</option>
    </select>
  </div>

  <hr/>
  <button type="submit" class="btn btn-primary" [disabled]="!meetingForm.valid || meeting.client_id === 0">
    Schedule Meeting
  </button>
  <a routerLink="/meetings" class="btn btn-secondary">Cancel</a>
</form>
