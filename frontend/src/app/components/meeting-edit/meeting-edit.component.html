<h2>Edit Meeting Schedule</h2>
<hr/>
<div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
<form (ngSubmit)="onSubmit()" #editForm="ngForm" class="form">
  <div class="form-group">
    <label>Meeting Topic</label>
    <input name="topic" type="text" [(ngModel)]="meeting.topic" required class="form-control"/>
  </div>
  <div class="form-group">
    <label>Number of People</label>
    <input name="number_of_people" type="number" min="1" [(ngModel)]="meeting.number_of_people" required class="form-control"/>
  </div>
  <div class="form-group">
    <label>Start Time</label>
    <input name="start_time" type="datetime-local" [(ngModel)]="meeting.start_time" required class="form-control"/>
  </div>
  <div class="form-group">
    <label>Client</label>
    <select name="client_id" [(ngModel)]="meeting.client_id" required class="form-control">
      <option *ngFor="let c of clients" [ngValue]="c.id">{{ c.name }}</option>
    </select>
  </div>
  <hr/>
  <button type="submit" class="btn btn-primary" [disabled]="!editForm.valid">Update</button>
  <a routerLink="/meetings" class="btn btn-secondary">Cancel</a>
</form>
