<div class="form-container">
  <h2>Create a Client</h2>
  <p class="subtitle">Please fill in this form to create a client.</p>
  <hr />

  <div *ngIf="message" class="alert alert-success">{{ message }}</div>
  <div *ngIf="error" class="alert alert-error">{{ error }}</div>

  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name">Name</label>
      <input id="name" type="text" [(ngModel)]="formData.name" name="name"
             placeholder="Enter Name" required />
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" [(ngModel)]="formData.email" name="email"
             placeholder="Enter Email" required />
    </div>

    <div class="form-group">
      <label for="address">Address</label>
      <input id="address" type="text" [(ngModel)]="formData.address" name="address"
             placeholder="Enter Address" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" [(ngModel)]="formData.password" name="password"
             placeholder="Enter Password" required />
    </div>

    <div class="form-group">
      <label for="repeatPassword">Repeat Password</label>
      <input id="repeatPassword" type="password" [(ngModel)]="formData.repeatPassword"
             name="repeatPassword" placeholder="Repeat Password" required />
    </div>

    <hr />
    <div class="btn-row">
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Registering...' : 'Register' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="resetForm()">Reset</button>
    </div>
  </form>

  <p class="link-text">Already have an account? <a routerLink="/login">Login here</a></p>
</div>
